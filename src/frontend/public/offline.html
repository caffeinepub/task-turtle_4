<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline — Task Turtle</title>
  <meta name="theme-color" content="#00ff88" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000000;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow: hidden;
    }

    /* Ambient glow */
    .glow-top {
      position: fixed;
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0,255,136,0.12) 0%, transparent 70%);
      pointer-events: none;
      animation: pulse 3s ease-in-out infinite;
    }
    .glow-bottom {
      position: fixed;
      bottom: -200px;
      right: -100px;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0,230,118,0.07) 0%, transparent 70%);
      pointer-events: none;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    .card {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 48px 40px;
      border-radius: 24px;
      border: 1px solid rgba(0, 255, 136, 0.2);
      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(20px);
      max-width: 420px;
      width: 100%;
      box-shadow: 0 0 80px rgba(0,255,136,0.08), 0 8px 40px rgba(0,0,0,0.8);
      animation: fadeInUp 0.6s ease forwards;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .icon-wrap {
      width: 88px;
      height: 88px;
      border-radius: 24px;
      background: rgba(0,255,136,0.1);
      border: 1.5px solid rgba(0,255,136,0.3);
      box-shadow: 0 0 40px rgba(0,255,136,0.25), inset 0 0 20px rgba(0,255,136,0.05);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 28px;
      animation: glowPulse 2.5s ease-in-out infinite;
    }

    @keyframes glowPulse {
      0%, 100% { box-shadow: 0 0 30px rgba(0,255,136,0.2), inset 0 0 15px rgba(0,255,136,0.04); }
      50% { box-shadow: 0 0 60px rgba(0,255,136,0.4), inset 0 0 25px rgba(0,255,136,0.08); }
    }

    .turtle-emoji {
      font-size: 44px;
      line-height: 1;
      display: block;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    h1 {
      font-size: 22px;
      font-weight: 800;
      color: #ffffff;
      letter-spacing: -0.5px;
      margin-bottom: 12px;
      line-height: 1.3;
    }

    .accent { color: #00ff88; }

    p {
      font-size: 14px;
      color: rgba(255,255,255,0.5);
      line-height: 1.6;
      margin-bottom: 28px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 100px;
      background: rgba(0,255,136,0.1);
      border: 1px solid rgba(0,255,136,0.25);
      font-size: 12px;
      font-weight: 600;
      color: #00ff88;
      margin-bottom: 28px;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #00ff88;
      animation: blink 1.5s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.2; }
    }

    .btn {
      display: inline-block;
      padding: 13px 28px;
      border-radius: 14px;
      background: linear-gradient(135deg, #00ff88 0%, #00E676 100%);
      color: #000000;
      font-weight: 700;
      font-size: 14px;
      text-decoration: none;
      cursor: pointer;
      border: none;
      box-shadow: 0 0 24px rgba(0,255,136,0.45), 0 4px 16px rgba(0,0,0,0.4);
      transition: all 0.2s;
      letter-spacing: 0.2px;
    }

    .btn:hover {
      box-shadow: 0 0 40px rgba(0,255,136,0.65), 0 4px 20px rgba(0,0,0,0.5);
      transform: translateY(-1px);
    }

    .brand {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 600;
      color: rgba(255,255,255,0.3);
      white-space: nowrap;
    }

    .brand-name { color: #00ff88; }

    .wifi-icon {
      font-size: 28px;
      margin-bottom: 6px;
      display: block;
      opacity: 0.4;
    }
  </style>
</head>
<body>
  <div class="glow-top"></div>
  <div class="glow-bottom"></div>

  <div class="card">
    <div class="icon-wrap">
      <span class="turtle-emoji">&#x1F422;</span>
    </div>

    <div class="badge">
      <div class="dot"></div>
      Still Running
    </div>

    <h1>You're offline, but<br /><span class="accent">Task Turtle</span> is still running</h1>

    <p>
      Looks like you've lost your internet connection.<br />
      Your data is safe — reconnect to continue.
    </p>

    <button class="btn" onclick="window.location.reload()">
      Try Again
    </button>
  </div>

  <div class="brand">
    <span>&#x1F422;</span>
    <span><span class="brand-name">Task</span> Turtle</span>
  </div>

  <script>
    // Auto-retry when connection is restored
    window.addEventListener('online', () => {
      window.location.reload();
    });
  </script>
</body>
</html>
