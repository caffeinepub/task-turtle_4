<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task Turtle</title>

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- PWA Meta Tags -->
    <meta name="application-name" content="Task Turtle" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Task Turtle" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#00ff88" />
    <meta name="msapplication-TileColor" content="#000000" />
    <meta name="msapplication-TileImage" content="/icon-192x192.png" />

    <!-- SEO / OG -->
    <meta name="description" content="Hyper-local task marketplace — post tasks, earn money, get things done." />

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192x192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512x512.png" />
    <link rel="shortcut icon" href="/icon-192x192.png" />

    <!-- Apple Touch Icon (iOS Add to Home Screen) -->
    <link rel="apple-touch-icon" href="/icon-192x192.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icon-192x192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/icon-512x512.png" />

    <!-- Image Preloads -->
    <link rel="preload" as="image" href="/assets/generated/carousel-banner.dim_800x500.jpg" />
    <link rel="preload" as="image" href="/assets/generated/carousel-courier.dim_800x500.jpg" />
    <link rel="preload" as="image" href="/assets/generated/carousel-grocery.dim_800x500.jpg" />
    <link rel="preload" as="image" href="/assets/generated/carousel-homehelp.dim_800x500.jpg" />
    <link rel="preload" as="image" href="/assets/generated/task-dogwalk.dim_400x240.jpg" />
    <link rel="preload" as="image" href="/assets/generated/task-faucet.dim_400x240.jpg" />
    <link rel="preload" as="image" href="/assets/generated/task-furniture.dim_400x240.jpg" />
    <link rel="preload" as="image" href="/assets/generated/task-grocery.dim_400x240.jpg" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Register advanced service worker
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          navigator.serviceWorker
            .register('/sw.js', { scope: '/' })
            .then(function (registration) {
              console.log('[PWA] Service Worker registered:', registration.scope);

              // Listen for updates
              registration.addEventListener('updatefound', function () {
                const newWorker = registration.installing;
                if (!newWorker) return;
                newWorker.addEventListener('statechange', function () {
                  if (
                    newWorker.state === 'installed' &&
                    navigator.serviceWorker.controller
                  ) {
                    // New SW is waiting — dispatch event so React can show the update banner
                    window.dispatchEvent(new CustomEvent('sw-update-available'));
                    console.log('[PWA] New update available');
                  }
                });
              });

              // Check for updates every 60 seconds
              setInterval(function () {
                registration.update().catch(function () {});
              }, 60000);
            })
            .catch(function (err) {
              console.warn('[PWA] Service Worker registration failed:', err);
            });

          // Reload page when new SW takes control
          var refreshing = false;
          navigator.serviceWorker.addEventListener('controllerchange', function () {
            if (refreshing) return;
            refreshing = true;
            window.location.reload();
          });
        });
      }
    </script>
  </body>
</html>
